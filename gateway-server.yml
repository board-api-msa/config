server:
  port: 8080

spring:
  cloud:
    gateway:
        discovery:
          locator:
            enabled: true  
            lower-case-service-id: true

eureka:
  instance:
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"  