spring:
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: create
    show-sql: true
  datasource:
    url: jdbc:postgresql://comment-service-database:5432/comment_service
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

eureka:
  instance:
    preferIpAddress: true
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka
    registerWithEureka: true
    fetchRegistry: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: "*"
